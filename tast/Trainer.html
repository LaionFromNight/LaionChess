<!DOCTYPE html>
<html lang="en" data-accent="cyan">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening Trainer — LaionChess</title>
<link rel="stylesheet" href="css/laion.css">
<link rel="stylesheet" href="css/board.css">
<style>
  .page { max-width: 1460px; }
  .trainer-grid {
    display: grid; grid-template-columns: minmax(0, 1fr) 400px; gap: 24px;
    align-items: start; margin-top: 8px;
  }
  .board-area { display: flex; gap: 12px; justify-content: center; align-items: flex-start; }
  .board-col { display: flex; flex-direction: column; gap: 10px; align-items: center; flex: 1; min-width: 0; }
  .board-wrap { width: min(100%, calc(100vh - 185px)); min-width: 280px; }
  .moves-strip {
    width: min(100%, calc(100vh - 185px));
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.5px;
    color: var(--text-dim); background: var(--panel-2);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 12px; min-height: 34px; line-height: 1.7;
  }
  .moves-strip .num { color: #444; margin-right: 2px; }
  .moves-strip .w { color: #e0e0e0; margin-right: 6px; }
  .moves-strip .b { color: #6cc5c8; margin-right: 10px; }
  .moves-strip .empty { color: #3a3a4a; }

  details.book-details {
    width: min(100%, calc(100vh - 185px));
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 12px;
  }
  details.book-details summary {
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-faint); cursor: pointer; user-select: none;
  }
  details.book-details .book { margin-top: 8px; }

  .side-panel {
    border: 1px solid var(--line); background: rgba(13, 17, 23, 0.7);
    border-radius: 12px; padding: 16px; display: flex; flex-direction: column;
    gap: 16px; min-height: 540px; position: relative;
  }
  .mode-header { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .mode-header .mode-name {
    font-family: var(--mono); font-size: 15px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  }
  .mode-header .course { color: var(--text-dim); font-size: 14px; }
  .mode-header .line-no { margin-left: auto; color: var(--text-faint); font-family: var(--mono); font-size: 12px; }

  .coach { display: flex; gap: 12px; align-items: flex-start; }
  .coach .avatar {
    flex: 0 0 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: #051520; border: 1px solid #00ffff30;
    font-size: 24px; color: var(--cyan);
    filter: drop-shadow(0 0 6px rgba(0, 255, 255, 0.35));
  }
  .coach .bubble {
    position: relative; flex: 1; background: #0a0a1a;
    border: 1px solid var(--accent-border); border-radius: 10px;
    padding: 12px 14px; font-size: 14px; line-height: 1.55; color: var(--text);
    min-height: 64px;
  }
  .coach .bubble::before {
    content: ''; position: absolute; left: -6px; top: 14px; width: 10px; height: 10px;
    background: #0a0a1a; border-left: 1px solid var(--accent-border);
    border-bottom: 1px solid var(--accent-border); transform: rotate(45deg);
  }
  .coach .bubble .sub { display: block; margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 1px; }

  .mode-tabs { display: flex; gap: 8px; }
  .mode-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 10px 8px; border-radius: 8px; cursor: pointer;
    background: transparent; border: 1px solid var(--line-2);
    color: var(--text-dim); font-family: var(--mono);
  }
  .mode-tab .t { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .mode-tab .s { font-size: 10px; color: var(--text-faint); letter-spacing: 1px; }
  .mode-tab.active { border-color: var(--accent-border); background: var(--accent-soft); color: var(--accent); }
  .mode-tab.locked { opacity: 0.45; cursor: not-allowed; }

  .lines-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; min-height: 120px; }
  .line-row {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: transparent; border: 1px solid var(--line); border-radius: 7px;
    color: var(--text-dim); padding: 9px 12px; cursor: pointer; text-align: left;
    font-family: var(--sans); font-size: 13px;
    transition: border-color 0.15s, background 0.15s;
  }
  .line-row:hover { background: rgba(255, 255, 255, 0.04); }
  .line-row.current { border-color: var(--accent-border); background: var(--accent-soft); color: var(--text); }
  .line-row .st { font-family: var(--mono); width: 16px; text-align: center; }
  .line-row .st.done { color: var(--green); }
  .line-row .st.todo { color: #3a3a4a; }
  .line-row .nm { flex: 1; }
  .line-row .tg { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); }

  .panel-toolbar { display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--line); padding-top: 14px; }
  .panel-toolbar .spacer { flex: 1; }

  .progress-row { display: flex; align-items: center; gap: 12px; margin: 6px 0 2px; }
  .progress-row .progress-track { flex: 1; }
  .progress-row .pct { font-family: var(--mono); font-size: 11px; color: var(--text-faint); min-width: 72px; text-align: right; }

  .complete-banner {
    border: 1px solid #00ff8840; background: rgba(0, 255, 136, 0.07);
    border-radius: 10px; padding: 14px; text-align: center;
  }
  .complete-banner .big {
    font-family: var(--mono); font-size: 15px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--green);
    text-shadow: 0 0 14px rgba(0, 255, 136, 0.5);
  }
  .complete-banner .small { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .complete-banner .row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }

  @media (max-width: 980px) {
    .trainer-grid { grid-template-columns: 1fr; }
    .side-panel { min-height: 0; }
    .board-area { flex-wrap: wrap; }
    .board-wrap, .moves-strip, details.book-details { width: min(100%, calc(100vh - 250px)); margin: 0 auto; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="page" data-screen-label="Opening Trainer">

  <header class="site-header menu-host">
    <a class="wordmark" href="index.html">
      <span class="knight">&#9822;</span><span class="name">LaionChess</span>
    </a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="Analysis.html">Analysis</a>
      <a href="Openings.html" class="active">Openings</a>
      <a href="Create Course.html">Create</a>
      <a href="Master Plan.html">Master Plan</a>
    </nav>
    <div class="nav-actions">
      <button class="btn btn-icon btn-ghost" id="nav-settings" title="Settings" aria-label="Settings">&#9881;</button>
    </div>
  </header>

  <div class="progress-row">
    <a class="btn btn-icon btn-ghost" href="Openings.html" title="Back to openings" aria-label="Back to openings">&#8592;</a>
    <div class="progress-track"><div class="progress-fill" id="ply-progress"></div></div>
    <span class="pct" id="ply-progress-label">0 / 0</span>
  </div>

  <div class="trainer-grid">
    <div class="board-area">
      <div id="spot-panel"></div>
      <div class="board-col">
      <div class="board-wrap"><div id="board"></div></div>
      <div class="moves-strip" id="moves-strip"><span class="empty">No moves yet &mdash; your move as White.</span></div>
      <details class="book-details" id="book-details">
        <summary>Common moves &mdash; master games</summary>
        <div class="book" id="book"></div>
      </details>
      </div>
    </div>

    <aside class="side-panel menu-host" data-screen-label="Trainer Side Panel">
      <div class="mode-header">
        <span class="mode-name" id="mode-name">Learn</span>
        <span class="course">Scotch Game</span>
        <span class="line-no" id="line-no">#1</span>
      </div>

      <div class="coach">
        <div class="avatar">&#9816;</div>
        <div class="bubble"><span id="coach-text">Loading…</span><span class="sub" id="coach-sub"></span></div>
      </div>

      <div id="complete-slot"></div>

      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-learn" type="button">
          <span class="t">&#128214; Learn</span><span class="s" id="learn-stat">0/6 lines</span>
        </button>
        <button class="mode-tab" id="tab-practice" type="button">
          <span class="t">&#127919; Practice</span><span class="s" id="practice-stat">0/6 lines</span>
        </button>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab locked" type="button" title="Learn 3 lines to unlock">
          <span class="t">&#128293; Drill</span><span class="s">&#128274; learn 3 lines</span>
        </button>
        <button class="mode-tab locked" type="button" title="Learn 3 lines to unlock">
          <span class="t">&#8987; Time</span><span class="s">&#128274; learn 3 lines</span>
        </button>
      </div>

      <div class="lines-list" id="lines-list"></div>

      <div class="panel-toolbar">
        <button class="btn btn-icon btn-ghost" id="panel-settings" title="Board settings" aria-label="Board settings">&#9881;</button>
        <button class="btn btn-ghost" id="btn-restart" title="Restart line">&#8635; Restart</button>
        <a class="btn btn-cyan" id="btn-analysis" href="Analysis.html">Analysis &#8594;</a>
        <div class="spacer"></div>
        <button class="btn btn-yellow" id="btn-hint">&#128161; Hint</button>
      </div>
    </aside>
  </div>
</div>

<script src="js/theme.js"></script>
<script src="js/board.js"></script>
<script src="js/settings-menu.js"></script>
<script src="js/book.js"></script>
<script src="js/spotting.js"></script>
<script src="js/scotch-lines.js"></script>
<script src="js/trainer.js"></script>
</body>
</html>
